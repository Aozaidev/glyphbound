side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${compatible_minecraft_versions}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="aozainkmc"
type="required"
versionRange="${aozainkmc_version_range}"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="patchouli"
type="required"
versionRange="${patchouli_version_range}"
ordering="AFTER"
side="BOTH"
